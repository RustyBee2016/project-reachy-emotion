<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Affective AI</title>
    <script>
      // GitHub Pages SPA redirect: converts path to hash route
      var pathSegmentsToKeep = 1; // repo name segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/' +
        '#/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
      );
    </script>
  </head>
  <body></body>
</html>
