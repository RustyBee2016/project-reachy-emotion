# Reachy Emotion Recognition - Nginx Configuration
# Ubuntu 2 (10.0.4.140) - Serves static video files and thumbnails

server {
    listen 80;
    server_name 10.0.4.140 localhost;

    # Increase client body size for video uploads
    client_max_body_size 100M;

    # Root directory for static files
    root /media/rusty_admin/project_data/reachy_emotion/videos;

    # Enable range requests for video streaming
    add_header Accept-Ranges bytes;

    # Serve video files from /videos/* paths
    location /videos/ {
        alias /media/rusty_admin/project_data/reachy_emotion/videos/;
        
        # Enable directory listing (optional, for debugging)
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # MIME types for video files
        types {
            video/mp4 mp4;
            video/x-msvideo avi;
            video/quicktime mov;
            video/x-matroska mkv;
        }
        
        # CORS headers for cross-origin requests
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        
        # Cache control
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Serve thumbnails from /thumbs/* paths
    location /thumbs/ {
        alias /media/rusty_admin/project_data/reachy_emotion/videos/thumbs/;
        
        types {
            image/jpeg jpg jpeg;
            image/png png;
        }
        
        # CORS headers
        add_header Access-Control-Allow-Origin *;
        
        # Cache thumbnails longer
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }

    # Default location - return 404 for other paths
    location / {
        return 404 "Not found. Use /videos/ or /thumbs/ paths.";
    }
}
