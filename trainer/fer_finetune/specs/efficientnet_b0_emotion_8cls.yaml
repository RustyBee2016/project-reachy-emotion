# EfficientNet-B0 Emotion Classifier Configuration
# Full 8-class classification (Ekman taxonomy)
# Model: HSEmotion enet_b0_8_best_vgaf (VGGFace2 + AffectNet pretrained)
#
# Classes: anger, contempt, disgust, fear, happy, neutral, sad, surprise
#
# Note: This config is for Phase 2+ when expanding beyond binary classification

# Model settings
model:
  backbone: efficientnet_b0
  num_classes: 8
  input_size: 224
  dropout_rate: 0.4
  pretrained_weights: enet_b0_8_best_vgaf
  freeze_backbone_epochs: 3
  unfreeze_layers: ["blocks.6", "blocks.5", "blocks.4", "conv_head"]
  use_multi_task: false
  model_storage_path: /media/rusty_admin/project_data/ml_models/efficientnet_b0

# Data settings
data:
  data_root: /media/project_data/reachy_emotion/videos
  train_dir: train
  val_dir: test
  batch_size: 24
  num_workers: 4
  pin_memory: true
  class_names: ["anger", "contempt", "disgust", "fear", "happy", "neutral", "sad", "surprise"]
  frame_sampling: middle
  frames_per_video: 1
  augmentation_enabled: true
  mixup_alpha: 0.3
  mixup_probability: 0.4
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]

# Training hyperparameters
num_epochs: 50
learning_rate: 0.0002
weight_decay: 0.0001
lr_scheduler: cosine
warmup_epochs: 5
min_lr: 0.000001
label_smoothing: 0.15
gradient_clip_norm: 1.0

# Early stopping
early_stopping_enabled: true
patience: 15
min_delta: 0.0005
monitor_metric: val_f1_macro

# Mixed precision training
mixed_precision: true

# Checkpointing
checkpoint_dir: /workspace/checkpoints/efficientnet_b0_8cls
save_best_only: true
save_interval: 5

# Quality gates (Gate A - adjusted for 8-class)
gate_a_min_f1_macro: 0.80
gate_a_min_per_class_f1: 0.70
gate_a_min_balanced_accuracy: 0.80
gate_a_max_ece: 0.10
gate_a_max_brier: 0.20

# Gate B (Jetson deployment)
gate_b_max_latency_p50_ms: 120.0
gate_b_max_latency_p95_ms: 250.0
gate_b_max_gpu_memory_gb: 2.5
gate_b_min_f1_macro: 0.75
gate_b_min_per_class_f1: 0.65

# MLflow tracking
mlflow_tracking_uri: file:///workspace/mlruns
mlflow_experiment_name: efficientnet_b0_emotion_8cls

# Reproducibility
seed: 42
deterministic: true
