# EfficientNet-B0 Emotion Classifier Configuration
# 3-class classification: happy, sad, neutral
# Model: HSEmotion enet_b0_8_best_vgaf (VGGFace2 + AffectNet pretrained)
#
# Performance targets (Jetson Xavier NX):
#   - Latency: ~40ms p50 (3× headroom vs 120ms budget)
#   - Memory: ~0.8 GB GPU (3× headroom vs 2.5 GB budget)

# Model settings
model:
  backbone: efficientnet_b0
  num_classes: 3
  input_size: 224
  dropout_rate: 0.3
  pretrained_weights: enet_b0_8_best_vgaf
  freeze_backbone_epochs: 5
  unfreeze_layers: ["blocks.6", "blocks.5", "conv_head"]
  use_multi_task: false
  model_storage_path: /media/rusty_admin/project_data/ml_models/efficientnet_b0

# Data settings
data:
  data_root: /media/rusty_admin/project_data/reachy_emotion/videos
  train_dir: train
  val_dir: test
  batch_size: 32
  num_workers: 4
  pin_memory: true
  class_names: ["happy", "sad", "neutral"]
  frame_sampling: middle
  frames_per_video: 1
  augmentation_enabled: true
  mixup_alpha: 0.2
  mixup_probability: 0.3
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]

# Training hyperparameters
num_epochs: 30
learning_rate: 0.0003
weight_decay: 0.0001
lr_scheduler: cosine
warmup_epochs: 3
min_lr: 0.000001
label_smoothing: 0.1
gradient_clip_norm: 1.0

# Early stopping
early_stopping_enabled: true
patience: 10
min_delta: 0.001
monitor_metric: val_f1_macro

# Mixed precision training
mixed_precision: true

# Checkpointing
checkpoint_dir: /media/rusty_admin/project_data/reachy_emotion/checkpoints/efficientnet_b0_3cls
save_best_only: true
save_interval: 5

# Quality gates (Gate A from requirements_08.4.2.md)
gate_a_min_f1_macro: 0.84
gate_a_min_per_class_f1: 0.75
gate_a_min_balanced_accuracy: 0.85
gate_a_max_ece: 0.08
gate_a_max_brier: 0.16

# Gate B (Jetson deployment) - EfficientNet-B0 specific
gate_b_max_latency_p50_ms: 120.0
gate_b_max_latency_p95_ms: 250.0
gate_b_max_gpu_memory_gb: 2.5
gate_b_min_f1_macro: 0.80
gate_b_min_per_class_f1: 0.72

# MLflow tracking
mlflow_tracking_uri: file:///media/rusty_admin/project_data/reachy_emotion/mlruns
mlflow_experiment_name: efficientnet_b0_emotion_3cls

# Reproducibility
seed: 42
deterministic: true
