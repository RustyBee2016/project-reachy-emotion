# ResNet-50 Emotion Classifier Training Configuration
# Binary classification: happy vs sad
# Pre-trained on AffectNet + RAF-DB
# Model placeholder: resnet50-affectnet-raf-db

model:
  backbone: "resnet50"
  pretrained_weights: "resnet50-affectnet-raf-db"  # Placeholder for AffectNet+RAF-DB weights
  num_classes: 2
  input_size: 224
  dropout_rate: 0.3
  use_multi_task: false
  
  # Transfer learning
  freeze_backbone_epochs: 5
  unfreeze_layers:
    - "layer4"
    - "fc"
  
  # Model storage path on Ubuntu 1
  model_storage_path: "/media/rusty_admin/project_data/ml_models/resnet50"

data:
  data_root: "/media/project_data/reachy_emotion/videos"
  train_dir: "train"
  val_dir: "test"
  
  class_names:
    - "happy"
    - "sad"
  
  batch_size: 32
  num_workers: 4
  pin_memory: true
  
  # Frame extraction
  frame_sampling: "random"  # random for training, middle for validation
  frames_per_video: 1
  
  # Augmentation
  augmentation_enabled: true
  mixup_alpha: 0.2
  mixup_probability: 0.3
  
  # Normalization (ImageNet stats)
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]

# Training hyperparameters
num_epochs: 50
learning_rate: 0.0001
weight_decay: 0.0001

# Learning rate schedule
lr_scheduler: "cosine"
warmup_epochs: 3
min_lr: 0.000001

# Regularization
label_smoothing: 0.1
gradient_clip_norm: 1.0

# Early stopping
early_stopping_enabled: true
patience: 10
min_delta: 0.001
monitor_metric: "val_f1_macro"

# Mixed precision
mixed_precision: true

# Checkpointing
checkpoint_dir: "/workspace/checkpoints/resnet50_emotion"
save_best_only: true
save_interval: 5

# Quality gates (from requirements_08.4.2.md)
gate_a_min_f1_macro: 0.84
gate_a_min_per_class_f1: 0.75
gate_a_min_balanced_accuracy: 0.85
gate_a_max_ece: 0.08
gate_a_max_brier: 0.16

gate_b_max_latency_p50_ms: 120.0
gate_b_max_latency_p95_ms: 250.0
gate_b_max_gpu_memory_gb: 2.5
gate_b_min_f1_macro: 0.80
gate_b_min_per_class_f1: 0.72

# MLflow tracking
mlflow_tracking_uri: "file:///workspace/mlruns"
mlflow_experiment_name: "resnet50_emotion_finetune"

# Reproducibility
seed: 42
deterministic: true
