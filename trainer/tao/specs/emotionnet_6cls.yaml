# EmotionNet 6-Class Training Configuration
# Full emotion classification: happy, sad, angry, neutral, surprise, fearful
# TAO Toolkit 4.0.0 compatible

model:
  # Architecture
  arch: "resnet18"
  input_shape: [224, 224, 3]
  num_classes: 6
  pretrained_weights: "imagenet"
  
  # Transfer learning strategy (more aggressive for 6 classes)
  freeze_blocks: [0]  # Only freeze first block
  freeze_bn: true
  
  # Dropout for regularization (higher for more classes)
  dropout_rate: 0.4
  
  # Model name
  model_name: "emotionnet_6cls"

dataset:
  # Data paths
  train_data_path: "/workspace/data/train"
  val_data_path: "/workspace/data/test"
  
  # Class names
  classes: ["happy", "sad", "angry", "neutral", "surprise", "fearful"]
  
  # Data format
  image_extension: ".jpg"
  
  # Image preprocessing
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]
  
  # Data augmentation (more aggressive for 6 classes)
  augmentation:
    enable: true
    
    random_flip: true
    flip_probability: 0.5
    
    random_rotation: true
    rotation_angle: 20  # Increased for more variation
    rotation_probability: 0.4
    
    random_crop: true
    crop_ratio_min: 0.75
    crop_ratio_max: 1.0
    
    color_jitter: true
    brightness: 0.4
    contrast: 0.4
    saturation: 0.3
    hue: 0.15
    color_jitter_probability: 0.6
    
    mixup: true
    mixup_alpha: 0.3
    mixup_probability: 0.4
    
    # Additional augmentations for 6-class
    random_erasing: true
    erasing_probability: 0.2
    erasing_area: [0.02, 0.15]
    
    normalize: true

training:
  # Batch configuration
  batch_size: 24  # Smaller batch for 6 classes
  num_workers: 4
  pin_memory: true
  
  # Training duration (longer for 6 classes)
  num_epochs: 80
  
  # Optimizer
  optimizer: "adam"
  learning_rate: 0.0005  # Lower initial LR
  weight_decay: 0.0002  # More regularization
  
  # Learning rate schedule
  lr_schedule:
    type: "cosine_with_restarts"
    warmup_epochs: 10
    warmup_start_lr: 0.00005
    min_lr: 0.000001
    restart_period: 20  # Restart every 20 epochs
    
  # Loss function
  loss:
    type: "categorical_crossentropy"
    label_smoothing: 0.15  # More smoothing for 6 classes
    
  # Class balancing (critical for 6 classes)
  class_weights: "balanced"
  
  # Early stopping
  early_stopping:
    enable: true
    patience: 15  # More patience for 6 classes
    metric: "val_f1_macro"
    mode: "max"
    min_delta: 0.0005
  
  # Checkpointing
  checkpoint:
    save_best_only: true
    monitor: "val_f1_macro"
    mode: "max"
    save_interval: 5
    
  # Mixed precision training
  mixed_precision: true
  
  # Gradient clipping
  gradient_clip_norm: 1.0

validation:
  # Validation frequency
  validation_interval: 1
  
  # Metrics to track
  metrics:
    - "accuracy"
    - "precision_macro"
    - "recall_macro"
    - "f1_macro"
    - "precision_weighted"
    - "recall_weighted"
    - "f1_weighted"
    - "confusion_matrix"
    - "per_class_accuracy"
    - "per_class_f1"
  
  # Validation batch size
  batch_size: 48

# Quality gates (adjusted for 6 classes)
gates:
  gate_a:
    # Offline validation requirements
    min_f1_macro: 0.75  # Lower threshold for 6 classes
    min_per_class_f1: 0.65
    max_per_class_f1_drop: 0.55
    min_balanced_accuracy: 0.78
    
  gate_b:
    # On-device requirements
    max_latency_p50_ms: 120
    max_latency_p95_ms: 250
    max_gpu_memory_gb: 2.5
    min_f1_macro: 0.70
    min_per_class_f1: 0.60

# Logging and monitoring
logging:
  tensorboard: true
  tensorboard_dir: "/workspace/experiments/tensorboard"
  
  mlflow: true
  mlflow_tracking_uri: "file:///workspace/mlruns"
  mlflow_experiment_name: "emotionnet_6cls"
  
  log_frequency: 10
  
  save_plots: true
  plot_dir: "/workspace/experiments/plots"

# Reproducibility
random_seed: 42
deterministic: true
