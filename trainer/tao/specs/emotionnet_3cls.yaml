# EmotionNet 3-Class Training Configuration
# Ternary emotion classification: happy, sad, neutral
# EfficientNet-B0 backbone with HSEmotion pretrained weights
# TAO Toolkit 4.0.0 compatible

model:
  # Architecture - EfficientNet-B0 for Phase 1
  arch: "efficientnet_b0"
  input_shape: [224, 224, 3]
  num_classes: 3
  pretrained_weights: "enet_b0_8_best_vgaf"  # HSEmotion VGGFace2 + AffectNet
  
  # Transfer learning strategy
  freeze_blocks: ["blocks.0", "blocks.1", "blocks.2", "blocks.3", "blocks.4"]
  unfreeze_blocks: ["blocks.5", "blocks.6", "conv_head"]  # Fine-tune last layers
  freeze_bn: true  # Freeze batch normalization in frozen blocks
  
  # Dropout for regularization
  dropout_rate: 0.3
  
  # Model name for checkpoints
  model_name: "emotionnet_3cls"

dataset:
  # Data paths (mounted in Docker)
  train_data_path: "/workspace/data/train"
  val_data_path: "/workspace/data/test"
  
  # Class names (3-class for Phase 1)
  classes: ["happy", "sad", "neutral"]
  
  # Data format
  image_extension: ".jpg"
  
  # Image preprocessing
  image_mean: [0.485, 0.456, 0.406]  # ImageNet mean
  image_std: [0.229, 0.224, 0.225]   # ImageNet std
  
  # Data augmentation
  augmentation:
    enable: true
    
    # Geometric augmentations
    random_flip: true
    flip_probability: 0.5
    
    random_rotation: true
    rotation_angle: 15  # degrees
    rotation_probability: 0.3
    
    random_crop: true
    crop_ratio_min: 0.8
    crop_ratio_max: 1.0
    
    # Color augmentations
    color_jitter: true
    brightness: 0.3
    contrast: 0.3
    saturation: 0.2
    hue: 0.1
    color_jitter_probability: 0.5
    
    # Advanced augmentations
    mixup: true
    mixup_alpha: 0.2
    mixup_probability: 0.3
    
    # Normalization (always applied)
    normalize: true

training:
  # Batch configuration
  batch_size: 32
  num_workers: 4
  pin_memory: true
  
  # Training duration
  num_epochs: 50
  
  # Optimizer
  optimizer: "adam"
  learning_rate: 0.0003  # Lower LR for fine-tuning pretrained model
  weight_decay: 0.0001
  
  # Learning rate schedule
  lr_schedule:
    type: "cosine"
    warmup_epochs: 3
    warmup_start_lr: 0.00003
    min_lr: 0.000001
    
  # Loss function
  loss:
    type: "categorical_crossentropy"
    label_smoothing: 0.1  # Regularization
    
  # Class balancing
  class_weights: "balanced"  # Auto-compute from dataset
  
  # Early stopping
  early_stopping:
    enable: true
    patience: 10
    metric: "val_f1_macro"
    mode: "max"
    min_delta: 0.001
  
  # Checkpointing
  checkpoint:
    save_best_only: true
    monitor: "val_f1_macro"
    mode: "max"
    save_interval: 5  # Save every 5 epochs
    
  # Mixed precision training
  mixed_precision: true
  
  # Gradient clipping
  gradient_clip_norm: 1.0

validation:
  # Validation frequency
  validation_interval: 1  # Validate every epoch
  
  # Metrics to track
  metrics:
    - "accuracy"
    - "precision_macro"
    - "recall_macro"
    - "f1_macro"
    - "f1_neutral"  # Important for 3-class
    - "confusion_matrix"
    - "per_class_accuracy"
    - "ece"  # Expected Calibration Error
    - "brier_score"
  
  # Validation batch size (can be larger)
  batch_size: 64

# Quality gates
gates:
  gate_a:
    # Offline validation requirements
    min_f1_macro: 0.84
    min_per_class_f1: 0.75
    max_per_class_f1_drop: 0.70  # No class below this
    min_balanced_accuracy: 0.85
    max_ece: 0.08  # Calibration requirement
    max_brier: 0.16
    
  gate_b:
    # On-device requirements (checked after export)
    max_latency_p50_ms: 120
    max_latency_p95_ms: 250
    max_gpu_memory_gb: 2.5
    min_f1_macro: 0.80
    min_per_class_f1: 0.72

# Logging and monitoring
logging:
  # TensorBoard
  tensorboard: true
  tensorboard_dir: "/workspace/experiments/tensorboard"
  
  # MLflow
  mlflow: true
  mlflow_tracking_uri: "file:///workspace/mlruns"
  mlflow_experiment_name: "emotionnet_3cls_efficientnet"
  
  # Console logging
  log_frequency: 10  # Log every 10 batches
  
  # Save training curves
  save_plots: true
  plot_dir: "/workspace/experiments/plots"

# Reproducibility
random_seed: 42
deterministic: true
