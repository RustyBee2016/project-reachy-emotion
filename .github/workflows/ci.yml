name: CI

on:
  push:
    branches: [master, "codex-phase-*"]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.5.0"
      - name: Ruff check
        run: ruff check apps/ shared/ trainer/ tests/
      - name: Ruff format check
        run: ruff format --check apps/ shared/ trainer/ tests/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reachy_dev
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: reachy_emotion
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REACHY_DATABASE_URL: "postgresql+asyncpg://reachy_dev:testpassword@localhost:5432/reachy_emotion"
      REACHY_VIDEOS_ROOT: "/tmp/reachy_videos"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,edge]"
      - name: Create test directories
        run: |
          mkdir -p /tmp/reachy_videos/{temp,train,test,thumbs,manifests,purged}
      - name: Run tests
        run: pytest tests/ -v --tb=short -x
