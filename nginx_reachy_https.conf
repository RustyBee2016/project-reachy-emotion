# Reachy Emotion Recognition - Nginx HTTPS Configuration
# Ubuntu 2 (10.0.4.140) - TLS 1.3 hardened reverse proxy + static file server
# Compliant with memory-bank/requirements.md §17 (Networking & Security)

# HTTP server - redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 10.0.4.140 localhost;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server - TLS 1.3 hardened
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 10.0.4.140 localhost;

    # =========================================================================
    # TLS Configuration - TLS 1.3 with strong ciphers
    # =========================================================================
    
    ssl_certificate /etc/ssl/reachy/reachy.crt;
    ssl_certificate_key /etc/ssl/reachy/reachy.key;

    # TLS 1.2 and 1.3 (TLS 1.3-only requires nginx 1.13+ with OpenSSL 1.1.1+)
    # For maximum security on this nginx version, use TLS 1.2+ with strong ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Strong cipher suites (prioritize TLS 1.3, fallback to strong TLS 1.2)
    # TLS 1.3 ciphers are automatically used when available
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    # SSL session configuration
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP stapling (if using CA-signed certs)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/ssl/reachy/chain.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # =========================================================================
    # API Proxy - Forward /api/* to FastAPI Gateway
    # =========================================================================
    
    location /api/ {
        # Proxy to FastAPI gateway on localhost:8000
        proxy_pass http://127.0.0.1:8000;
        
        # Preserve original request information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
        
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint (direct nginx response)
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # =========================================================================
    # Static Files - Videos and Thumbnails
    # =========================================================================
    
    # Increase client body size for video uploads
    client_max_body_size 100M;

    # Serve video files from /videos/* paths
    location /videos/ {
        alias /mnt/videos/;
        
        # Enable range requests for video streaming
        add_header Accept-Ranges bytes;
        
        # Directory listing (optional, for debugging)
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # MIME types for video files
        types {
            video/mp4 mp4;
            video/x-msvideo avi;
            video/quicktime mov;
            video/x-matroska mkv;
        }
        
        # CORS headers for cross-origin requests
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        
        # Cache control
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Serve thumbnails from /thumbs/* paths
    location /thumbs/ {
        alias /mnt/videos/thumbs/;
        
        types {
            image/jpeg jpg jpeg;
            image/png png;
        }
        
        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        
        # Cache thumbnails longer
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # =========================================================================
    # Default Location
    # =========================================================================
    
    location / {
        return 404 "Not found. Use /api/, /videos/, or /thumbs/ paths.\n";
        add_header Content-Type text/plain;
    }
}
